version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: house_ledger_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: houseledger
      POSTGRES_PASSWORD: houseledger
      POSTGRES_DB: houseledger
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U houseledger"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
